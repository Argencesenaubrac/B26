<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Four</title>

<style>
html, body {
    height: 100%;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #a8c6d8, #eaf4f4);
    color: #2f3e4e;
    text-align: center;
}

/* Conteneur */
.container {
    width: 100%;
    max-width: 600px;
    padding: 20px;
    text-align: center;
}

/* Carte */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

/* Texte narratif */
.story {
    font-style: italic;
    margin-bottom: 20px;
    color: #5a6b7a;
    text-align: center;
}

/* Question */
h1 {
    font-size: 20px;
    margin-bottom: 20px;
    text-align: center;
}

/* Boutons */
.choice {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: #2f3e4e;
    color: white;
    transition: 0.3s;
    text-align: center;
}

.choice:hover {
    background: #1f2a35;
}

.choice:focus {
    outline: 3px solid #ffcc00;
}

/* Messages */
.success, .error {
    display: none;
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.success {
    background: #dff5e1;
    border-left: 5px solid #2e7d32;
}

.error {
    background: #fde2e2;
    border-left: 5px solid #c62828;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>
            Selon toi, quel est ce bâtiment ?
        </h1>

        <button class="choice" data-correct="false">Une école</button>
        <button class="choice" data-correct="true">Un four</button>
        <button class="choice" data-correct="false">Un poulailler</button>

        <div id="success" class="success">
            ✅ Bien deviné!!<br>
          C’est un four communal, où les habitants venaient cuire leur pain.
Un lieu chaleureux, au sens propre comme au figuré qui est en cours de rénovation.
        </div>

        <div id="error" class="error">
            ❌ Mauvaise réponse… Essaie encore !
        </div>

    </div>
</div>

<script>
const buttons = document.querySelectorAll(".choice");
const success = document.getElementById("success");
const error = document.getElementById("error");

buttons.forEach(button => {
    button.addEventListener("click", () => {
        const isCorrect = button.getAttribute("data-correct") === "true";

        if (isCorrect) {
            success.style.display = "block";
            error.style.display = "none";
        } else {
            error.style.display = "block";
            success.style.display = "none";
        }
    });
});
</script>

</body>
</html>
